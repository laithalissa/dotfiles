### Core
# UTF-8 support
setw -g utf8 on
set-option -g default-command "reattach-to-user-namespace -l zsh"

### User Interaction
# remap prefix to C-t, C-b clashes with emacs keybinding. Duh!
unbind C-b
set -g prefix C-t
#bind C-t send-prefix


### Mouse support for weirdos
set -g mode-mouse on
set -g mouse-resize-pane on
set -g mouse-select-pane on
set -g mouse-select-window on


### Vi key bindings
set -g mode-keys vi

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -t vi-copy v begin-selection
bind-key -t vi-copy y copy-pipe "reattach-to-user-namespace pbcopy"


### Colours and prettyfication
# Enable colours
set -g default-terminal "screen-256color"
# Set the footer bar to sexy-purple
set -g status-bg color53


# TODO: Check if I need this
# Update default binding of `Enter` to also use copy-pipe
unbind -t vi-copy Enter
bind-key -t vi-copy Enter copy-pipe "reattach-to-user-namespace pbcopy"

### Wtf does this do?
set -g allow-rename off

# force a reload of the config file - Why?
unbind r
bind r source-file ~/.tmux.conf

